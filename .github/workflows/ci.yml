name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  notify-failure:
    name: Open issue on CI failure
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: failure()
    steps:
      - name: Create GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const isPr = context.eventName === 'pull_request';
            const pr = context.payload.pull_request;
            const title = isPr
              ? `CI failed for PR #${pr.number}`
              : `CI failed on ${context.ref.replace('refs/heads/', '')}`;
            const body = [
              'The CI workflow failed.',
              '',
              isPr
                ? `- PR: #${pr.number} (\`${pr.head.ref}\`)`
                : `- Branch: \`${context.ref.replace('refs/heads/', '')}\``,
              `- Workflow run: ${runUrl}`,
              `- Commit: \`${context.sha}\``,
              '',
              'Check the workflow logs for details. Common causes:',
              '- Lint errors',
              '- Build failure',
              '- Test failure',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
